app-id: com.github.joseexposito.touche
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: com.github.joseexposito.touche
finish-args:
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--socket=wayland'
  - '--filesystem=~/.config'
  - '--filesystem=host:ro'
  - '--device=dri'
modules:
  - name: nodejs
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://nodejs.org/dist/v22.16.0/node-v22.16.0.tar.xz
        sha256: 720894f323e5c1ac24968eb2676660c90730d715cb7f090be71a668662a17c37

  - name: touche
    buildsystem: meson
    config-opts:
      - -Dflatpak=true
      - -Dsystem-config-file-path=/var/run/host/usr/share/touchegg/touchegg.conf
    sources:
      - type: archive
        url: https://github.com/JoseExposito/touche/releases/download/2.0.15/archive.tar.gz
        sha256: f7cb1a1565da233a1b60198acef7c79299273d83c70c492fc0e287d0a7ac3827
